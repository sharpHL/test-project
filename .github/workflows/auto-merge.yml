name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  auto-merge:
    if: >-
      contains(github.event.pull_request.body, 'Closes #') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'needs-review')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge $PR_NUMBER --auto --merge --delete-branch --repo ${{ github.repository }} || echo "Auto-merge already enabled or not eligible"
